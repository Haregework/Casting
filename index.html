<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Casting — Simulation Data</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0d0d0d; --surface: #161616; --card: #1c1c1e; --border: #2a2a2a; --accent: #e8c87a; --accent2: #c8a84b; --text: #f0ede8; --muted: #888; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    header { position: relative; padding: 80px 60px 60px; border-bottom: 1px solid var(--border); overflow: hidden; }
    header::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 70% 60% at 80% 50%, rgba(232,200,122,.08) 0%, transparent 70%); pointer-events: none; }
    .header-tag { display: inline-block; font-size: 11px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; color: var(--accent); border: 1px solid var(--accent2); padding: 4px 12px; border-radius: 2px; margin-bottom: 24px; opacity: 0; animation: fadeUp .6s .1s forwards; }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(64px, 10vw, 130px); line-height: .92; letter-spacing: .02em; color: var(--text); opacity: 0; animation: fadeUp .7s .2s forwards; }
    h1 span { color: var(--accent); }
    .header-sub { margin-top: 20px; font-size: 15px; color: var(--muted); max-width: 480px; line-height: 1.7; opacity: 0; animation: fadeUp .7s .35s forwards; }
    .header-meta { margin-top: 36px; display: flex; gap: 36px; opacity: 0; animation: fadeUp .7s .5s forwards; }
    .meta-item { display: flex; flex-direction: column; gap: 4px; }
    .meta-label { font-size: 10px; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); }
    .meta-value { font-size: 22px; font-family: 'Bebas Neue', sans-serif; color: var(--accent); }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(13,13,13,.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 60px; display: flex; gap: 0; overflow-x: auto; scrollbar-width: none; }
    nav::-webkit-scrollbar { display: none; }
    .nav-link { padding: 16px 20px; font-size: 12px; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); text-decoration: none; white-space: nowrap; border-bottom: 2px solid transparent; transition: color .2s, border-color .2s; }
    .nav-link:hover { color: var(--text); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }
    main { padding: 60px; }
    .topic-section { margin-bottom: 80px; opacity: 0; transform: translateY(24px); transition: opacity .6s, transform .6s; }
    .topic-section.visible { opacity: 1; transform: none; }
    .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 12px; }
    .section-num { font-family: 'Bebas Neue', sans-serif; font-size: 13px; color: var(--accent); letter-spacing: .1em; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(28px, 4vw, 46px); letter-spacing: .03em; color: var(--text); }
    .section-divider { height: 1px; background: linear-gradient(90deg, var(--accent2) 0%, transparent 60%); margin-bottom: 16px; }
    .section-note { font-size: 14px; color: var(--muted); line-height: 1.75; max-width: 680px; margin-bottom: 32px; padding-left: 16px; border-left: 2px solid var(--border); white-space: pre-line; }
    .media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .media-card { background: var(--card); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color .2s, transform .2s; cursor: pointer; }
    .media-card:hover { border-color: var(--accent2); transform: translateY(-3px); }
    .media-thumb { position: relative; aspect-ratio: 16/9; background: #111; overflow: hidden; }
    .media-thumb video, .media-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .play-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,.35); transition: background .2s; }
    .media-card:hover .play-overlay { background: rgba(0,0,0,.15); }
    .play-btn { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(232,200,122,.35); transition: transform .2s; }
    .media-card:hover .play-btn { transform: scale(1.1); }
    .play-btn svg { width: 20px; height: 20px; fill: #000; margin-left: 3px; }
    .media-type-badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,.7); border: 1px solid var(--border); color: var(--muted); font-size: 9px; letter-spacing: .12em; text-transform: uppercase; padding: 3px 8px; border-radius: 2px; }
    .media-info { padding: 14px 16px; }
    .media-label { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 4px; }
    .media-caption { font-size: 12px; color: var(--muted); line-height: 1.5; }
    #lightbox { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,.92); align-items: center; justify-content: center; padding: 40px; }
    #lightbox.open { display: flex; }
    #lightbox-inner { position: relative; max-width: 900px; width: 100%; }
    #lightbox video, #lightbox img { width: 100%; border-radius: 4px; display: block; max-height: 80vh; object-fit: contain; }
    #lightbox-close { position: absolute; top: -40px; right: 0; background: none; border: none; color: var(--muted); font-size: 28px; cursor: pointer; transition: color .2s; font-family: 'DM Sans', sans-serif; }
    #lightbox-close:hover { color: var(--text); }
    #lightbox-title { margin-top: 14px; font-size: 14px; color: var(--muted); text-align: center; }
    .empty-state { padding: 60px 40px; text-align: center; border: 1px dashed var(--border); border-radius: 4px; color: var(--muted); font-size: 14px; }
    footer { padding: 40px 60px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    footer span { font-size: 12px; color: var(--muted); letter-spacing: .06em; }
    .footer-brand { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--accent); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }
    @media (max-width: 700px) { header, main, footer { padding: 40px 24px; } nav { padding: 0 24px; } .header-meta { gap: 24px; } .media-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<header>
  <div class="header-tag">Simulation Study — Material Science</div>
  <h1>Cast<span>ing</span></h1>
  <p class="header-sub">Explore our simulation data across all casting subtopics. Select a section below to review the videos and imagery.</p>
  <div class="header-meta">
    <div class="meta-item"><span class="meta-label">Topics</span><span class="meta-value" id="meta-topics">—</span></div>
    <div class="meta-item"><span class="meta-label">Media files</span><span class="meta-value" id="meta-media">—</span></div>
  </div>
</header>
<nav id="topic-nav"></nav>
<main id="main-content"></main>
<div id="lightbox">
  <div id="lightbox-inner">
    <button id="lightbox-close">✕</button>
    <div id="lightbox-media"></div>
    <div id="lightbox-title"></div>
  </div>
</div>
<footer>
  <span class="footer-brand">Casting</span>
  <span>Simulation Data Presentation</span>
</footer>
<script>
const CASTING_DATA = {"topics":[{"title":"Sand Casting","note":"","media":[{"src":"youtube:hnrt8hkkhz0","type":"video","label":"","caption":""}]}]};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function ytId(src){return src&&src.startsWith('youtube:')?src.slice(8).trim():null;}
function buildNav(topics){
  document.getElementById('topic-nav').innerHTML=topics.map((t,i)=>
    '<a class="nav-link'+(i===0?' active':'')+'" href="#topic-'+i+'">'+esc(t.title)+'</a>'
  ).join('');
}
function buildContent(topics){
  let total=0;
  document.getElementById('main-content').innerHTML=topics.map((topic,ti)=>{
    const items=topic.media||[]; total+=items.length;
    const grid=items.length?items.map(m=>{
      const yt=ytId(m.src); let thumb,badge,dtype;
      if(yt){
        thumb='<img src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;"><div class="play-overlay"><div class="play-btn" style="background:#ff0000;"><svg viewBox="0 0 24 24" style="fill:#fff;margin-left:3px"><polygon points="5,3 19,12 5,21"/></svg></div></div>';
        badge='YouTube';dtype='youtube';
      }else if(m.type==='video'){
        thumb='<video src="'+esc(m.src)+'" muted preload="metadata" style="pointer-events:none;width:100%;height:100%;object-fit:cover;display:block;"></video><div class="play-overlay"><div class="play-btn"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div></div>';
        badge='Video';dtype='video';
      }else{
        thumb='<img src="'+esc(m.src)+'" alt="'+esc(m.label)+'" loading="lazy" style="width:100%;height:100%;object-fit:cover;display:block;">';
        badge='Image';dtype='image';
      }
      return '<div class="media-card" data-src="'+esc(m.src)+'" data-type="'+dtype+'" data-label="'+esc(m.label)+'" onclick="openLightbox(this)"><div class="media-thumb">'+thumb+'<span class="media-type-badge">'+badge+'</span></div><div class="media-info"><div class="media-label">'+esc(m.label||(m.type==='video'?'Simulation Video':'Figure'))+'</div>'+(m.caption?'<div class="media-caption">'+esc(m.caption)+'</div>':'')+'</div></div>';
    }).join(''):'<div class="empty-state">No media in this section yet.</div>';
    const num=ti<9?'0'+(ti+1):(ti+1);
    return '<section class="topic-section" id="topic-'+ti+'"><div class="section-header"><span class="section-num">'+num+'</span><h2 class="section-title">'+esc(topic.title)+'</h2></div><div class="section-divider"></div>'+(topic.note?'<p class="section-note">'+esc(topic.note)+'</p>':'')+'<div class="media-grid">'+grid+'</div></section>';
  }).join('');
  document.getElementById('meta-topics').textContent=topics.length;
  document.getElementById('meta-media').textContent=total;
}
function initObserver(){
  const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible');}),{threshold:0.08});
  document.querySelectorAll('.topic-section').forEach(s=>obs.observe(s));
}
function initScrollSpy(){
  const links=document.querySelectorAll('.nav-link');
  const obs=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting){const id=x.target.id;links.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+id));}}),{rootMargin:'-40% 0px -55% 0px'});
  document.querySelectorAll('.topic-section').forEach(s=>obs.observe(s));
}
function openLightbox(card){
  const src=card.dataset.src,type=card.dataset.type,label=card.dataset.label;
  const m=document.getElementById('lightbox-media');
  if(type==='youtube'){
    const id=ytId(src);
    m.innerHTML='<div style="position:relative;aspect-ratio:16/9;width:100%;"><iframe src="https://www.youtube.com/embed/'+id+'?autoplay=1" frameborder="0" allow="autoplay;fullscreen" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border-radius:4px;"></iframe></div>';
  }else if(type==='video'){
    m.innerHTML='<video src="'+src+'" controls autoplay style="max-height:75vh;width:100%"></video>';
  }else{
    m.innerHTML='<img src="'+src+'" alt="'+label+'" style="max-height:75vh;width:100%;object-fit:contain">';
  }
  document.getElementById('lightbox-title').textContent=label;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  const v=document.querySelector('#lightbox-media video');if(v)v.pause();
  const f=document.querySelector('#lightbox-media iframe');if(f)f.src='';
}
document.getElementById('lightbox-close').onclick=closeLightbox;
document.getElementById('lightbox').onclick=e=>{if(e.target===document.getElementById('lightbox'))closeLightbox();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLightbox();});
const topics=CASTING_DATA.topics||[];
if(topics.length){buildNav(topics);buildContent(topics);initObserver();initScrollSpy();}
else{document.getElementById('main-content').innerHTML='<div class="empty-state">No simulation data yet.</div>';}
</script>
</body>
</html>
