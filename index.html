<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Casting — Simulation Data</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0d0d;--card:#1c1c1e;--border:#2a2a2a;--accent:#e8c87a;--accent2:#c8a84b;--text:#f0ede8;--muted:#888}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
header{position:relative;padding:80px 60px 60px;border-bottom:1px solid var(--border);overflow:hidden}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 80% 50%,rgba(232,200,122,.08) 0%,transparent 70%);pointer-events:none}
.tag{display:inline-block;font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);border:1px solid var(--accent2);padding:4px 12px;border-radius:2px;margin-bottom:24px;opacity:0;animation:up .6s .1s forwards}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,130px);line-height:.92;color:var(--text);opacity:0;animation:up .7s .2s forwards}
h1 span{color:var(--accent)}
.sub{margin-top:20px;font-size:15px;color:var(--muted);max-width:480px;line-height:1.7;opacity:0;animation:up .7s .35s forwards}
.meta{margin-top:36px;display:flex;gap:36px;opacity:0;animation:up .7s .5s forwards}
.mi{display:flex;flex-direction:column;gap:4px}
.ml{font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.mv{font-size:22px;font-family:'Bebas Neue',sans-serif;color:var(--accent)}
nav{position:sticky;top:0;z-index:100;background:rgba(13,13,13,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 60px;display:flex;overflow-x:auto;scrollbar-width:none}
nav::-webkit-scrollbar{display:none}
.nl{padding:16px 20px;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.nl:hover{color:var(--text)}.nl.active{color:var(--accent);border-bottom-color:var(--accent)}
main{padding:60px}
.sec{margin-bottom:80px;opacity:0;transform:translateY(24px);transition:opacity .6s,transform .6s}
.sec.visible{opacity:1;transform:none}
.sh{display:flex;align-items:baseline;gap:20px;margin-bottom:12px}
.sn{font-family:'Bebas Neue',sans-serif;font-size:13px;color:var(--accent);letter-spacing:.1em}
.st{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,4vw,46px);color:var(--text)}
.sd{height:1px;background:linear-gradient(90deg,var(--accent2) 0%,transparent 60%);margin-bottom:16px}
.note{font-size:14px;color:var(--muted);line-height:1.75;max-width:680px;margin-bottom:32px;padding-left:16px;border-left:2px solid var(--border);white-space:pre-line}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px}
.card{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:border-color .2s,transform .2s;cursor:pointer}
.card:hover{border-color:var(--accent2);transform:translateY(-3px)}
.thumb{position:relative;aspect-ratio:16/9;background:#111;overflow:hidden}
.thumb img,.thumb video{width:100%;height:100%;object-fit:cover;display:block}
.overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.35);transition:background .2s}
.card:hover .overlay{background:rgba(0,0,0,.15)}
.pbtn{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .2s}
.card:hover .pbtn{transform:scale(1.1)}
.pbtn svg{width:20px;height:20px;margin-left:3px}
.badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.7);border:1px solid var(--border);color:var(--muted);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;border-radius:2px}
.info{padding:14px 16px}
.lbl{font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.cap{font-size:12px;color:var(--muted);line-height:1.5}
#lb{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.92);align-items:center;justify-content:center;padding:40px}
#lb.open{display:flex}
#lbi{position:relative;max-width:900px;width:100%}
#lbclose{position:absolute;top:-40px;right:0;background:none;border:none;color:var(--muted);font-size:28px;cursor:pointer;line-height:1;transition:color .2s}
#lbclose:hover{color:var(--text)}
#lbmedia video,#lbmedia img{width:100%;border-radius:4px;display:block;max-height:80vh;object-fit:contain}
#lbtitle{margin-top:14px;font-size:14px;color:var(--muted);text-align:center}
.empty{padding:60px 40px;text-align:center;border:1px dashed var(--border);border-radius:4px;color:var(--muted);font-size:14px}
footer{padding:40px 60px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px}
footer span{font-size:12px;color:var(--muted);letter-spacing:.06em}
.fb{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@media(max-width:700px){header,main,footer{padding:40px 24px}nav{padding:0 24px}.meta{gap:24px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <div class="tag">Simulation Study — Material Science</div>
  <h1>Cast<span>ing</span></h1>
  <p class="sub">Explore our simulation data across all casting subtopics.</p>
  <div class="meta">
    <div class="mi"><span class="ml">Topics</span><span class="mv" id="mtopics">—</span></div>
    <div class="mi"><span class="ml">Media files</span><span class="mv" id="mmedia">—</span></div>
  </div>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<div id="lb"><div id="lbi">
  <button id="lbclose">✕</button>
  <div id="lbmedia"></div>
  <div id="lbtitle"></div>
</div></div>
<footer><span class="fb">Casting</span><span>Simulation Data Presentation</span></footer>
<script>
const DATA={"topics":[{"title":"Triple_Clamp_Investment _Casting_Iteration_1","note":"This was our first iteration with overflows at the ends of the cast parts. We noticed a very small amount of porosity at the geometeric center of our cast parts. Flow is well guided, solidification is unifrom except one single part.","media":[{"src":"youtube:D3U9K2i1e2Q","type":"video","label":"","caption":""}]},{"title":"Triple_Clamp_Investment _Casting_Iteration_2","note":"For this iteration we add risers so as to account for the porosity and we can see a slight reduction in porosity. In addition we noticed a much better cooling characteristic as compared to the first model. Overflows representing vents are also added here. ","media":[{"src":"youtube:TrzU4df5mGU","type":"video","label":"","caption":""}]},{"title":"Triple_Clamp_Investment _Casting_Iteration_3","note":"For this iteration we removed the risers and instead we focused on adding chillers to account for the porosity and we can see a slight reduction in porosity. In addition we noticed a much better cooling characteristic as compared to the first model. Overflows representing vents are also added here. ","media":[{"src":"youtube:AT3xCqjebeY","type":"video","label":"","caption":""}]}]};
function ytId(s){return s&&s.startsWith('youtube:')?s.slice(8).trim().split(/[?&]/)[0]:null;}
function buildNav(t){document.getElementById('nav').innerHTML=t.map((x,i)=>'<a class="nl'+(i===0?' active':'')+'" href="#s'+i+'">'+x.title+'</a>').join('');}
function buildMain(topics){
  let tot=0;
  document.getElementById('main').innerHTML=topics.map((t,i)=>{
    const items=t.media||[];tot+=items.length;
    const num=String(i+1).padStart(2,'0');
    const cards=items.length?items.map(m=>{
      const yt=ytId(m.src);let inner,badge,dtype;
      if(yt){inner='<img src="https://img.youtube.com/vi/'+yt+'/hqdefault.jpg" loading="lazy"><div class="overlay"><div class="pbtn" style="background:#ff0000"><svg viewBox="0 0 24 24" fill="#fff"><polygon points="5,3 19,12 5,21"/></svg></div></div>';badge='YouTube';dtype='youtube';}
      else if(m.type==='video'){inner='<video src="'+m.src+'" muted preload="metadata" style="pointer-events:none"></video><div class="overlay"><div class="pbtn" style="background:var(--accent)"><svg viewBox="0 0 24 24" fill="#000"><polygon points="5,3 19,12 5,21"/></svg></div></div>';badge='Video';dtype='video';}
      else{inner='<img src="'+m.src+'" loading="lazy">';badge='Image';dtype='image';}
      return '<div class="card" data-src="'+m.src+'" data-type="'+dtype+'" data-label="'+(m.label||'')+'" onclick="openLb(this)"><div class="thumb">'+inner+'<span class="badge">'+badge+'</span></div><div class="info"><div class="lbl">'+(m.label||badge)+'</div>'+(m.caption?'<div class="cap">'+m.caption+'</div>':'')+'</div></div>';
    }).join(''):'<div class="empty">No media in this section.</div>';
    return '<section class="sec" id="s'+i+'"><div class="sh"><span class="sn">'+num+'</span><h2 class="st">'+t.title+'</h2></div><div class="sd"></div>'+(t.note?'<p class="note">'+t.note+'</p>':'')+'<div class="grid">'+cards+'</div></section>';
  }).join('');
  document.getElementById('mtopics').textContent=topics.length;
  document.getElementById('mmedia').textContent=tot;
}
function initObs(){const o=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)x.target.classList.add('visible')}),{threshold:.08});document.querySelectorAll('.sec').forEach(s=>o.observe(s));}
function initSpy(){const ls=document.querySelectorAll('.nl');const o=new IntersectionObserver(e=>e.forEach(x=>{if(x.isIntersecting)ls.forEach(l=>l.classList.toggle('active',l.getAttribute('href')==='#'+x.target.id));}),{rootMargin:'-40% 0px -55% 0px'});document.querySelectorAll('.sec').forEach(s=>o.observe(s));}
function openLb(card){
  const src=card.dataset.src,type=card.dataset.type,label=card.dataset.label;
  const m=document.getElementById('lbmedia');
  if(type==='youtube'){const id=ytId(src);m.innerHTML='<div style="position:relative;aspect-ratio:16/9;width:100%"><iframe src="https://www.youtube-nocookie.com/embed/'+id+'?autoplay=1&rel=0" frameborder="0" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture" allowfullscreen style="position:absolute;inset:0;width:100%;height:100%;border-radius:4px"></iframe></div>';}
  else if(type==='video'){m.innerHTML='<video src="'+src+'" controls autoplay style="max-height:75vh;width:100%"></video>';}
  else{m.innerHTML='<img src="'+src+'" alt="'+label+'" style="max-height:75vh;width:100%;object-fit:contain">';}
  document.getElementById('lbtitle').textContent=label;
  document.getElementById('lb').classList.add('open');
}
function closeLb(){document.getElementById('lb').classList.remove('open');const v=document.querySelector('#lbmedia video');if(v)v.pause();const f=document.querySelector('#lbmedia iframe');if(f)f.src='';document.getElementById('lbmedia').innerHTML='';}
document.getElementById('lbclose').onclick=closeLb;
document.getElementById('lb').onclick=e=>{if(e.target===document.getElementById('lb'))closeLb();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeLb();});
const topics=DATA.topics||[];
if(topics.length){buildNav(topics);buildMain(topics);initObs();initSpy();}
else document.getElementById('main').innerHTML='<div class="empty">No content yet.</div>';
</script>
</body>
</html>
